# LibreChat Configuration
# https://www.librechat.ai/docs/configuration/librechat_yaml

version: 1.2.1
cache: true

# =============================================================================
# MCP Server Configuration
# =============================================================================
# NEOLO MCP - Translation Management System integration for memoQ and Phrase

mcpSettings:
  allowedDomains:
    # New embedded endpoint (NEOLO MCP consolidation Phase 1.0, May 2026)
    - 'https://api.neolo.ai'
    # Old standalone endpoint kept whitelisted for rollback during 7-day soak
    - 'http://mcp.railway.internal:8080'

mcpServers:
  neolo-mcp:
    type: sse
    # Cutover from internal librechat-project MCP service (mcp.railway.internal:8080)
    # to embedded /mcp on neolo-project Backend (api.neolo.ai/mcp). The old
    # service stays running for 7 days as rollback target. Revert by changing
    # this single URL line back to http://mcp.railway.internal:8080/sse.
    url: https://api.neolo.ai/mcp/sse
    timeout: 1800000      # 30 minutes for long-running operations (MQM reports, large projects)
    initTimeout: 30000    # 30 seconds for initialization
    headers:
      Authorization: "Bearer ${NEOLO_TMS_MCP_API_KEY}"

# =============================================================================
# Available NEOLO TMS MCP Tools
# =============================================================================
# Once connected, these tools are available in chat:
#
# Project Tools:
#   - list_projects: List all projects from TMS
#   - get_project: Get project details by GUID
#   - get_project_statistics: Get project statistics
#
# Document Tools:
#   - list_documents: List documents in a project
#   - get_document: Get document details
#   - export_document: Export document content
#   - get_segment_pairs: Get source/target segment pairs
#   - reimport_document: Reimport translated document
#
# Document Caching Tools:
#   - load_document: Load document segments into session cache
#   - get_segment_with_context: View segment with surrounding context
#   - search_segments: Search text within document
#   - get_document_summary: Get document statistics
#   - unload_document: Remove document from cache
#
# Terminology Tools:
#   - list_termbases: List available termbases
#   - search_termbase: Search terms in termbase
#
# Translation Memory Tools:
#   - list_translation_memories: List available TMs
#   - search_translation_memory: Search TM for concordance
#
# Supported TMS Providers: memoQ, Phrase

# =============================================================================
# Agent Configuration
# =============================================================================
endpoints:
  agents:
    recursionLimit: 150       # Default max steps per agent turn (MQM reports need ~80-100 polls)
    maxRecursionLimit: 200    # Hard ceiling for per-agent overrides

# =============================================================================
# Model Specs — context-cost guardrail (2026-06-05, revised 2026-06-08)
# =============================================================================
# Background: chat users on the raw anthropic endpoint accumulated 339k+ tokens
# of context per turn (history re-sent every turn → O(n^2)) + the ~38k MCP tool
# schema floor, producing $45-71/day spikes. Fix: a single enforced spec that
# routes ALL chat through the NEOLO Assistant agent (Sonnet 4.6, 64k context cap
# in the agent's model_parameters, all 91 neolo-mcp tools). enforce:true + no
# addedEndpoints => users cannot reach the raw uncapped endpoint, so every
# request is on the cheap capped path and the per-user budget is only ever
# spent there. Agent id: agent_N2AY02yFV92f15ZNCM1p6G (public-viewer ACL = all).
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "neolo-assistant"
      label: "NEOLO Assistant"
      default: true
      description: "memoQ/Phrase projects, termbases, TMs, QA, MQM, terminology. Context-capped (64k) for cost control."
      preset:
        endpoint: "agents"
        agent_id: "agent_N2AY02yFV92f15ZNCM1p6G"

interface:
  modelSelect: true
  parameters: true
  presets: true
  sidePanel: true

# =============================================================================
# Per-user spend cap (cost backstop)
# =============================================================================
# Replaces the deprecated CHECK_BALANCE env. 1,000,000 credits = $1.
# Auto-refill is lazy + additive: refillAmount is added only when a request
# would drive the balance to <=0 AND the interval has elapsed since lastRefill.
# Net effect = a hard $30/user/day ceiling that self-heals daily (no rollover).
balance:
  enabled: true
  startBalance: 30000000      # $30 one-time starting buffer
  autoRefillEnabled: true
  refillAmount: 30000000      # +$30 ...
  refillIntervalValue: 1
  refillIntervalUnit: days    # ... once per day, only when balance hits 0
